services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: fieldnode_db
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
       - SECRET_KEY=fieldnode-dev-secret-key
       - FIELDNODE_API_KEY=fieldnode-demo-2024
       - DEBUG=False
       - USE_SQLITE=False
       - DB_NAME=fieldnode_db
       - DB_USER=root
       - DB_PASSWORD=root_password
       - DB_HOST=db
       - DB_PORT=3306
       - ALLOWED_HOSTS=127.0.0.1,localhost,web
       - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - FIELDNODE_SERVER_API_URL=http://web:8000/api
      - NEXT_PUBLIC_API_URL=http://127.0.0.1:8000/api
      - NEXT_PUBLIC_FIELDNODE_API_KEY=fieldnode-demo-2024
    depends_on:
      - web

volumes:
  mysql_data:
