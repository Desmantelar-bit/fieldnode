<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FieldNode — Detalhes da Máquina</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background-color: #f8f9fa; }
    .topbar { background-color: #343a40; color: white; padding: 20px 0; margin-bottom: 30px; }
    .topbar .container-lg { display: flex; align-items: center; }
    .topbar h1 { margin: 0; font-size: 28px; flex: 1; }
    .back-btn { color: white; text-decoration: none; margin-right: 20px; font-size: 14px; }
    .back-btn:hover { color: #ddd; }
    .metric-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .metric-box { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 20px; text-align: center; }
    .metric-label { font-size: 12px; color: #666; margin-bottom: 8px; text-transform: uppercase; }
    .metric-value { font-size: 28px; font-weight: bold; color: #28a745; }
    .chart-card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .chart-container { position: relative; height: 300px; margin-top: 15px; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="container-lg">
    <a href="dashboard.html" class="back-btn">← Voltar para o Dashboard</a>
    <h1 id="page-title">Carregando...</h1>
  </div>
</div>

<div class="container-lg">
  <div id="content">
    <div class="text-center py-5">
      <div class="spinner-border text-success" role="status"></div>
      <p class="mt-3 text-muted">Carregando dados da máquina...</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
<script src="config.js"></script>
<script src="js/api.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const maquinaId = params.get('id');

if (!maquinaId) {
  document.getElementById('content').innerHTML = 
    '<div class="alert alert-danger">Nenhuma máquina selecionada. <a href="dashboard.html" class="alert-link">Voltar ao Dashboard</a></div>';
}

let tempChart = null;
let vibChart = null;
let rpmChart = null;

async function carregarMaquina() {
  try {
    const leituras = await apiFetch(`/api/telemetria/?maquina_id=${maquinaId}`);
    
    if (!leituras || leituras.length === 0) {
      document.getElementById('content').innerHTML = 
        '<div class="alert alert-warning">Nenhum dado encontrado para esta máquina. <a href="dashboard.html" class="alert-link">Voltar</a></div>';
      return;
    }

    const ultima = leituras[leituras.length - 1];
    document.getElementById('page-title').textContent = `Máquina ${maquinaId}`;

    const tempColor = ultima.temperatura > 85 ? '#dc3545' : ultima.temperatura > 75 ? '#ffc107' : '#28a745';
    const vibColor = ultima.vibracao > 0.8 ? '#dc3545' : ultima.vibracao > 0.5 ? '#ffc107' : '#28a745';
    const rpmColor = ultima.rpm < 1300 ? '#ffc107' : '#28a745';

    document.getElementById('content').innerHTML = `
      <div class="metric-row">
        <div class="metric-box">
          <div class="metric-label">Temperatura</div>
          <div class="metric-value" style="color: ${tempColor}">${ultima.temperatura}°C</div>
        </div>
        <div class="metric-box">
          <div class="metric-label">Vibração</div>
          <div class="metric-value" style="color: ${vibColor}">${ultima.vibracao}g</div>
        </div>
        <div class="metric-box">
          <div class="metric-label">RPM</div>
          <div class="metric-value" style="color: ${rpmColor}">${ultima.rpm}</div>
        </div>
        <div class="metric-box">
          <div class="metric-label">Status</div>
          <div class="metric-value" style="font-size: 18px; color: ${tempColor}">${ultima.nivel_risco || 'NORMAL'}</div>
        </div>
      </div>

      <div class="chart-card">
        <h5>Histórico de Temperatura</h5>
        <div class="chart-container">
          <canvas id="temp-chart"></canvas>
        </div>
      </div>

      <div class="chart-card">
        <h5>Histórico de Vibração</h5>
        <div class="chart-container">
          <canvas id="vib-chart"></canvas>
        </div>
      </div>

      <div class="chart-card">
        <h5>Histórico de RPM</h5>
        <div class="chart-container">
          <canvas id="rpm-chart"></canvas>
        </div>
      </div>
    `;

    const labels = leituras.map((_, i) => `#${i + 1}`);
    const tempData = leituras.map(l => l.temperatura);
    const vibData = leituras.map(l => l.vibracao);
    const rpmData = leituras.map(l => l.rpm);

    const tempCtx = document.getElementById('temp-chart');
    if (tempChart) tempChart.destroy();
    tempChart = new Chart(tempCtx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Temperatura (°C)',
          data: tempData,
          borderColor: '#dc3545',
          backgroundColor: 'rgba(220, 53, 69, 0.1)',
          tension: 0.4,
          fill: true,
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: true, position: 'top' }
        },
        scales: {
          y: { beginAtZero: false }
        }
      }
    });

    const vibCtx = document.getElementById('vib-chart');
    if (vibChart) vibChart.destroy();
    vibChart = new Chart(vibCtx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Vibração (g)',
          data: vibData,
          borderColor: '#ffc107',
          backgroundColor: 'rgba(255, 193, 7, 0.1)',
          tension: 0.4,
          fill: true,
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: true, position: 'top' }
        },
        scales: {
          y: { beginAtZero: true }
        }
      }
    });

    const rpmCtx = document.getElementById('rpm-chart');
    if (rpmChart) rpmChart.destroy();
    rpmChart = new Chart(rpmCtx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'RPM',
          data: rpmData,
          borderColor: '#28a745',
          backgroundColor: 'rgba(40, 167, 69, 0.1)',
          tension: 0.4,
          fill: true,
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: true, position: 'top' }
        },
        scales: {
          y: { beginAtZero: false }
        }
      }
    });

  } catch (e) {
    console.error('[carregarMaquina]', e);
    document.getElementById('content').innerHTML = 
      `<div class="alert alert-danger">Erro ao carregar dados: ${e.message}<br><a href="dashboard.html" class="alert-link">Voltar ao Dashboard</a></div>`;
  }
}

if (maquinaId) carregarMaquina();
</script>

</body>
</html>
